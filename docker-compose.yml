services:
  sharelatex:
    image: sharelatex/sharelatex:latest
    restart: always
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - dokploy-network
      - overleaf_net
    volumes:
      - overleaf_data:/var/lib/overleaf
    environment:
      OVERLEAF_APP_NAME: "Overleaf Community Edition"
      OVERLEAF_SITE_URL: "https://overleaf.mcalisir.com"
      OVERLEAF_BEHIND_PROXY: "true"
      OVERLEAF_SECURE_COOKIE: "true"

      OVERLEAF_MONGO_URL: "mongodb://mongo/sharelatex"
      OVERLEAF_REDIS_HOST: "redis"
      REDIS_HOST: "redis"

      ENABLED_LINKED_FILE_TYPES: "project_file,project_output_file"
      ENABLE_CONVERSIONS: "true"
      EMAIL_CONFIRMATION_DISABLED: "true"

  mongo:
    image: mongo:8
    restart: always
    command: ["--replSet", "rs0", "--bind_ip_all"]
    networks:
      - overleaf_net
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand(\"ping\").ok' | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    restart: always
    command: ["redis-server", "--dir", "/data"]
    networks:
      - overleaf_net
    volumes:
      - redis_data:/data

networks:
  overleaf_net:
    driver: bridge
  dokploy-network:
    external: true

volumes:
  overleaf_data:
  mongo_data:
  redis_data:
