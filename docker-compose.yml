services:
  sharelatex:
    restart: always
    image: sharelatex/sharelatex
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    stop_grace_period: 60s
    volumes:
      - ~/sharelatex_data:/var/lib/overleaf
      # Server Pro için gerekli (Community Edition’da genelde gerekmez)
      # - /var/run/docker.sock:/var/run/docker.sock
    environment:
      OVERLEAF_APP_NAME: Overleaf Community Edition
      OVERLEAF_MONGO_URL: mongodb://mongo/sharelatex

      # Redis (iki isimle kullanılıyor)
      OVERLEAF_REDIS_HOST: redis
      REDIS_HOST: redis

      ENABLED_LINKED_FILE_TYPES: "project_file,project_output_file"
      ENABLE_CONVERSIONS: "true"
      EMAIL_CONFIRMATION_DISABLED: "true"

      # Community Edition için sandboxed compiles desteklenmez.
      # Açık kalırsa compile tarafında sorun çıkarabilir; bu yüzden kapalı bırak.
      # SANDBOXED_COMPILES: "true"
      # SANDBOXED_COMPILES_HOST_DIR_COMPILES: "/home/user/sharelatex_data/data/compiles"
      # SANDBOXED_COMPILES_HOST_DIR_OUTPUT: "/home/user/sharelatex_data/data/output"
      # DOCKER_RUNNER: "true"
      # SANDBOXED_COMPILES_SIBLING_CONTAINERS: "true"
    networks:
      - dokploy-network

  mongo:
    restart: always
    image: mongo:6.0
    command: "--replSet overleaf"
    volumes:
      - ~/mongo_data:/data/db
      - ./bin/shared/mongodb-init-replica-set.js:/docker-entrypoint-initdb.d/mongodb-init-replica-set.js
    environment:
      MONGO_INITDB_DATABASE: sharelatex
    extra_hosts:
      - mongo:127.0.0.1
    healthcheck:
      test: echo 'db.stats().ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - dokploy-network

  redis:
    restart: always
    image: redis:6.2
    volumes:
      - ~/redis_data:/data
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
